apiVersion: v1
kind: ConfigMap
metadata:
  name: autodoc-config
  namespace: autodoc-ai
data:
  REDIS_URL: redis://redis:6379/0
  UPLOAD_DIR: /data/uploads
  RESULTS_DIR: /data/results
  QUEUE_NAME: autodoc:queue
  DEAD_LETTER_QUEUE_NAME: autodoc:dlq
  METRICS_SUMMARY_KEY: autodoc:metrics:summary
  BACKEND_CORS_ORIGINS: http://localhost:3000,http://localhost:5173

