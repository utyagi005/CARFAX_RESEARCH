apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: autodoc-ai
  annotations:
    autodoc.ai/keda-upgrade-path: "In production, queue depth can drive scaling with KEDA's Redis scaler or Prometheus Adapter custom metrics."
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

